<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rPPG Biometric Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .dashboard-container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 450px;
        }
        h1 { margin-top: 0; color: #94a3b8; }
        
        .bpm-display {
            font-size: 80px;
            font-weight: bold;
            margin: 20px 0;
            transition: color 0.3s ease;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        /* Status Colors */
        .status-good { background-color: #22c55e; color: #000; }
        .status-bad { background-color: #f59e0b; color: #000; }
        .status-critical { background-color: #ef4444; color: #fff; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .diagnosis-console {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: left;
            font-size: 14px;
            color: #cbd5e1;
            min-height: 80px;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Live Bio-Metrics</h1>
        <div id="statusBadge" class="status-badge status-good">Calibrating...</div>
        <div id="bpmValue" class="bpm-display">--</div>
        
        <div class="diagnosis-console">
            <strong>System Status / AI Report:</strong> <br>
            <span id="diagnosisText" style="color: #64748b;">Connecting to camera feed and establishing baseline physiological metrics...</span>
        </div>
    </div>

    <script>
        async function fetchBPM() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                // Update the BPM Number
                const bpmElement = document.getElementById('bpmValue');
                bpmElement.innerText = data.bpm > 0 ? data.bpm : '--';
                
                // Automatically inject the AI Diagnosis text from Python
                document.getElementById('diagnosisText').innerText = data.diagnosis;
                
                // Update the Badge Colors
                updateAlertStatus(data.bpm);

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        function updateAlertStatus(bpm) {
            const badge = document.getElementById('statusBadge');
            const bpmDisplay = document.getElementById('bpmValue');
            const diagnosisText = document.getElementById('diagnosisText');

            if (bpm === 0) {
                badge.className = 'status-badge';
                badge.style.backgroundColor = '#64748b';
                badge.innerText = 'Calibrating...';
                return;
            }

            if (bpm >= 60 && bpm <= 90) {
                badge.className = 'status-badge status-good';
                badge.innerText = 'Good';
                bpmDisplay.style.color = '#22c55e'; 
                diagnosisText.style.color = '#38bdf8'; // Highlight AI text in blue when active
            } 
            else if ((bpm > 90 && bpm < 105) || (bpm > 45 && bpm < 60)) {
                badge.className = 'status-badge status-bad';
                badge.innerText = 'Elevated';
                bpmDisplay.style.color = '#f59e0b'; 
                diagnosisText.style.color = '#38bdf8'; 
            } 
            else {
                badge.className = 'status-badge status-critical';
                badge.innerText = 'Critical';
                bpmDisplay.style.color = '#ef4444'; 
                diagnosisText.style.color = '#38bdf8'; 
            }
        }

        // Ping the server exactly twice a second (500ms)
        setInterval(fetchBPM, 500);
    </script>
</body>
</html>
