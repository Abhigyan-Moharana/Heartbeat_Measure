<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric AI Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-6">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-blue-400">Qualcomm rPPG Pulse Engine</h1>
            <p class="text-gray-400">AI-Powered Cardiovascular Diagnostic Terminal</p>
        </header>

        <!-- Top Grid: 3 Divisions -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl text-center">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Live Heart Rate</h2>
                <div id="bpmDisplay" class="text-4xl font-mono text-blue-300 mt-4">-- BPM</div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl text-center">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Condition</h2>
                <div id="statusAlert" class="text-4xl font-bold mt-4 text-gray-400">--</div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl text-center">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">AI Clinical Insights</h2>
                <p id="diagnosisText" class="text-sm mt-4 leading-relaxed text-gray-300">Initializing sensors...</p>
            </div>
        </div>

        <!-- 4th Division: Full Width -->
        <div class="mt-6 bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl text-center">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Calculated Session Average</h2>
            <div id="avgBpmDisplay" class="text-3xl font-mono mt-2 text-blue-400">-- BPM</div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                const bpm = data.bpm;

                // 1. Live Heart Rate
                document.getElementById('bpmDisplay').innerText = bpm > 0 ? `${bpm} BPM` : "-- BPM";
                
                // 2. AI Insight (Countdown or Report)
                document.getElementById('diagnosisText').innerText = data.diagnosis;

                // 3. Calculated Session Average
                document.getElementById('avgBpmDisplay').innerText = data.avg_bpm > 0 ? `${data.avg_bpm} BPM` : "-- BPM";

                // 4. Condition Logic
                const alertBox = document.getElementById('statusAlert');
                if (bpm >= 60 && bpm <= 90) {
                    alertBox.innerText = "GOOD";
                    alertBox.className = "text-4xl font-bold mt-4 text-green-400";
                } else if (bpm > 0 && (bpm < 60 || bpm > 90)) {
                    alertBox.innerText = "MODERATE";
                    alertBox.className = "text-4xl font-bold mt-4 text-yellow-400";
                } else {
                    alertBox.innerText = "--";
                    alertBox.className = "text-4xl font-bold mt-4 text-gray-400";
                }
            } catch (err) {
                console.error("Update failed", err);
            }
        }
        setInterval(updateDashboard, 500);
    </script>
</body>
</html>
